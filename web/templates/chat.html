{% extends "base.html" %}
{% block title %}Chat — Garmin Health Coach{% endblock %}
{% block content %}
<h1>Chat with your coach</h1>
<div id="log">
  {% for t in history %}
  <div class="msg {{ t.role }}">{{ t.text }}</div>
  {% endfor %}
</div>
<form id="chatform" onsubmit="return send(event)">
  <input id="box" autocomplete="off" placeholder="Ask about your health data…"
         style="max-width:none">
  <button type="submit">Send</button>
  <button type="button" onclick="clearChat()" class="secondary">Clear chat</button>
</form>
<script>
const log = document.getElementById("log");
function add(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  log.appendChild(div);
  div.scrollIntoView();
  return div;
}
async function send(e) {
  e.preventDefault();
  const box = document.getElementById("box");
  const message = box.value.trim();
  if (!message) return false;
  box.value = "";
  add("user", message);
  const div = add("coach", "…");
  const resp = await fetch("/chat/send", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message}),
  });
  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  div.textContent = "";
  for (;;) {
    const {done, value} = await reader.read();
    if (done) break;
    div.textContent += dec.decode(value, {stream: true});
    div.scrollIntoView();
  }
  return false;
}
async function clearChat() {
  await fetch("/chat/clear", {method: "POST"});
  log.innerHTML = "";
}
</script>
{% endblock %}
